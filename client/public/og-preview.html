<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #08080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.06;
      pointer-events: none;
    }
    .wordmark {
      font-size: 80px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }
    .wordmark span {
      color: #fff;
    }
    .descriptor {
      font-size: 22px;
      font-weight: 400;
      color: #94a3b8;
      margin-top: -8px;
    }
    .tagline {
      font-size: 32px;
      font-weight: 400;
      color: #22a8c4;
      letter-spacing: 0.01em;
      margin-top: -16px;
    }
  </style>
</head>
<body>
  <div class="wordmark"><span>H</span>eadwater</div>
<div class="tagline">Upstream of the algorithm.</div>
</body>
</html>
