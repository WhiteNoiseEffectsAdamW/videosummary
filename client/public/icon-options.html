<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0c0f14; color: #e8e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px 32px; }
    h1 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 48px; }
    .section { margin-bottom: 48px; }
    .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; margin-bottom: 20px; }
    .options { display: flex; flex-wrap: wrap; gap: 12px; }
    .option {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      min-width: 100px;
    }
    .option:hover { border-color: #22d3ee; background: #0f1f2e; }
    .option.selected { border-color: #22d3ee; background: #0f1f2e; }
    .option svg { color: #94a3b8; }
    .option:hover svg, .option.selected svg { color: #22d3ee; }
    .option-label { font-size: 11px; color: #475569; text-align: center; }

    /* Nav preview */
    .nav-preview {
      background: #08080f;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 0;
      overflow: hidden;
      max-width: 420px;
      margin-top: 40px;
    }
    .nav-preview-label { font-size: 12px; color: #475569; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .mock-nav {
      display: flex;
      border-top: 1px solid #1e293b;
      background: #08080f;
      padding: 10px 0 18px;
    }
    .mock-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; color: #475569;
    }
    .mock-tab.active { color: #22d3ee; }
    .mock-tab svg { width: 22px; height: 22px; }
    .mock-screen { height: 80px; background: #08080f; }
  </style>
</head>
<body>

<h1>Icon Options</h1>
<p class="subtitle">Click to select — preview updates at the bottom</p>

<!-- FOLLOWING -->
<div class="section">
  <div class="section-title">Following tab</div>
  <div class="options">

    <div class="option" data-tab="following" data-id="f1" onclick="select(this)">
      <!-- Bell -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <div class="option-label">Bell</div>
    </div>

    <div class="option" data-tab="following" data-id="f2" onclick="select(this)">
      <!-- Bookmark -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <div class="option-label">Bookmark</div>
    </div>

    <div class="option" data-tab="following" data-id="f3" onclick="select(this)">
      <!-- Star -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <div class="option-label">Star</div>
    </div>

    <div class="option" data-tab="following" data-id="f4" onclick="select(this)">
      <!-- RSS feed -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11a9 9 0 0 1 9 9"/>
        <path d="M4 4a16 16 0 0 1 16 16"/>
        <circle cx="5" cy="19" r="1" fill="currentColor"/>
      </svg>
      <div class="option-label">RSS Feed</div>
    </div>

    <div class="option" data-tab="following" data-id="f5" onclick="select(this)">
      <!-- Inbox -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </svg>
      <div class="option-label">Inbox</div>
    </div>

    <div class="option" data-tab="following" data-id="f6" onclick="select(this)">
      <!-- Channels / grid -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      <div class="option-label">Grid</div>
    </div>

    <div class="option" data-tab="following" data-id="f7" onclick="select(this)">
      <!-- Heart -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <div class="option-label">Heart</div>
    </div>

    <div class="option" data-tab="following" data-id="f8" onclick="select(this)">
      <!-- Antenna / broadcast -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h.01"/>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M5 12.5a9 9 0 0 1 14 0"/>
        <path d="M1.5 9a13 13 0 0 1 21 0"/>
      </svg>
      <div class="option-label">Broadcast</div>
    </div>

  </div>
</div>

<!-- SUMMARIZE -->
<div class="section">
  <div class="section-title">Summarize tab</div>
  <div class="options">

    <div class="option" data-tab="summarize" data-id="s1" onclick="select(this)">
      <!-- Sparkle 4-point -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2c0 5-3 8-10 10 7 2 10 5 10 10 0-5 3-8 10-10-7-2-10-5-10-10z"/>
      </svg>
      <div class="option-label">Sparkle</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s2" onclick="select(this)">
      <!-- Lightning bolt -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <div class="option-label">Lightning</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s3" onclick="select(this)">
      <!-- Wand -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8L19 13M17.8 6.2L19 5M12.2 6.2L11 5M12.2 11.8L11 13"/>
        <path d="M2 20l8-8"/>
        <circle cx="15" cy="9" r="3"/>
      </svg>
      <div class="option-label">Wand</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s4" onclick="select(this)">
      <!-- Quote bubble -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="9" y1="10" x2="15" y2="10"/>
        <line x1="9" y1="14" x2="13" y2="14"/>
      </svg>
      <div class="option-label">Summary</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s5" onclick="select(this)">
      <!-- Compress / distill -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
      </svg>
      <div class="option-label">Compress</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s6" onclick="select(this)">
      <!-- Layers / distill -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
      <div class="option-label">Layers</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s7" onclick="select(this)">
      <!-- Eye -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <div class="option-label">Eye</div>
    </div>

    <div class="option" data-tab="summarize" data-id="s8" onclick="select(this)">
      <!-- Funnel -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      <div class="option-label">Funnel</div>
    </div>

  </div>
</div>

<!-- PREVIEW -->
<div>
  <div class="nav-preview-label">Nav preview</div>
  <div class="nav-preview">
    <div class="mock-screen"></div>
    <div class="mock-nav">
      <div class="mock-tab active" id="preview-videos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 8l6 4-6 4V8z" fill="currentColor" stroke="none"/>
        </svg>
        My Videos
      </div>
      <div class="mock-tab" id="preview-following">
        <!-- default: bell -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Following
      </div>
      <div class="mock-tab" id="preview-summarize">
        <!-- default: sparkle -->
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2c0 5-3 8-10 10 7 2 10 5 10 10 0-5 3-8 10-10-7-2-10-5-10-10z"/>
        </svg>
        Summarize
      </div>
      <div class="mock-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log out
      </div>
    </div>
  </div>
</div>

<script>
const svgs = {
  f1: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
  f2: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`,
  f3: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  f4: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg>`,
  f5: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  f6: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  f7: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
  f8: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M5 12.5a9 9 0 0 1 14 0"/><path d="M1.5 9a13 13 0 0 1 21 0"/></svg>`,
  s1: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c0 5-3 8-10 10 7 2 10 5 10 10 0-5 3-8 10-10-7-2-10-5-10-10z"/></svg>`,
  s2: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  s3: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8L19 13M17.8 6.2L19 5M12.2 6.2L11 5M12.2 11.8L11 13"/><path d="M2 20l8-8"/><circle cx="15" cy="9" r="3"/></svg>`,
  s4: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/></svg>`,
  s5: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`,
  s6: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  s7: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  s8: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>`,
};

function select(el) {
  const tab = el.dataset.tab;
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const id = el.dataset.id;
  const preview = document.getElementById(`preview-${tab}`);
  if (preview) preview.innerHTML = svgs[id] + `<span>${tab === 'following' ? 'Following' : 'Summarize'}</span>`;
}
</script>
</body>
</html>
